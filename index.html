<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Actualidad Geek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --accent: #f5a623;
      --accent2: #ffcc70;
      --text: #f0eefc;
      --muted: #7a7a9a;
      --glow: rgba(245, 166, 35, 0.15);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 40%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.11) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrap {
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease both;
    }

    .avatar-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8621a, #f5a623);
      background-size: 200%;
      animation: gradientSpin 4s linear infinite;
      padding: 2.5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 44px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
    }

    .profile-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .profile-name .word-actualidad {
      color: #ffffff;
    }

    .profile-name .word-geek {
      background: linear-gradient(90deg, #f5d020, #f5a623, #c8621a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-bio {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.5px;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f5a623, transparent);
      margin: 24px 0;
      animation: fadeDown 0.6s 0.25s ease both;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--glow), transparent);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .link-btn:hover {
      border-color: rgba(245,166,35,0.35);
      transform: translateX(4px);
      background: var(--surface2);
    }

    .link-btn:hover::before { opacity: 1; }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-label { flex: 1; }

    .link-sublabel {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1px;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 16px;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow { color: var(--accent2); transform: translateX(2px); }

    .ic-ig   { background: rgba(225,48,108,0.12); }
    .ic-tt   { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.07); }
    .ic-mail { background: rgba(245,166,35,0.12); }

    .section-label {
      width: 100%;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: 2px;
      padding-left: 4px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientSpin {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .links .link-btn:nth-child(1) { animation: fadeDown 0.5s 0.30s ease both; }
    .links .link-btn:nth-child(2) { animation: fadeDown 0.5s 0.37s ease both; }
    .links .link-btn:nth-child(3) { animation: fadeDown 0.5s 0.44s ease both; }
    .links .link-btn:nth-child(4) { animation: fadeDown 0.5s 0.51s ease both; }
    .links .link-btn:nth-child(5) { animation: fadeDown 0.5s 0.58s ease both; }

    .footer {
      margin-top: 40px;
      font-size: 11px;
      color: rgba(120,120,150,0.4);
      letter-spacing: 0.5px;
      animation: fadeDown 0.5s 0.7s ease both;
    }
  </style>
</head>
<body>

</body>
</html>
